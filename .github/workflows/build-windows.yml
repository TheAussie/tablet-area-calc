name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "app.py"
      - "osu_tablet_area_calc.py"
      - "tablet_areas.json"
      - "README.md"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Compile-check Python files
        run: python -m py_compile app.py osu_tablet_area_calc.py

      - name: Build EXE
        run: >
          python -m PyInstaller
          --noconfirm
          --onefile
          --windowed
          --name TabletAreaCalculator
          --add-data "tablet_areas.json;."
          app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabletAreaCalculator-Windows
          path: dist/TabletAreaCalculator.exe