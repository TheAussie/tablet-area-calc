name: Release Windows EXE

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Compile-check Python files
        run: python -m py_compile app.py osu_tablet_area_calc.py scripts\generate_tablet_areas_from_otd.py

      - name: Build EXE
        run: >
          python -m PyInstaller
          --noconfirm
          --onefile
          --windowed
          --name TabletAreaCalculator
          --add-data "tablet_areas.json;."
          app.py

      - name: Package release zip
        run: |
          New-Item -ItemType Directory -Force release
          Copy-Item dist/TabletAreaCalculator.exe release/
          Copy-Item tablet_areas.json release/
          Compress-Archive -Path release/* -DestinationPath TabletAreaCalculator-Windows.zip -Force

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TabletAreaCalculator.exe
            tablet_areas.json
            TabletAreaCalculator-Windows.zip
          generate_release_notes: true